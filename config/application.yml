# External configuration file for Docker deployment.
# Mount this file to /app/config/application.yml via docker-compose.
#
# Add your Swagger/OpenAPI services below.
swagger-center:
  services:
    - name: petstore
      url: https://petstore3.swagger.io
      swagger-path: /api/v3/openapi.json
      description: Swagger Petstore sample API
